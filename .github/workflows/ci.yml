name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geoglobe_test
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3002
          NEXT_PUBLIC_APP_URL: http://localhost:3002
